
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.wrap{padding:1rem 0}
.hero{text-align:center;padding:1.5rem 1rem 1.2rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem}
.hero h1{font-size:24px;font-weight:500;color:var(--color-text-primary)}
.hero p{font-size:13px;color:var(--color-text-secondary);margin-top:5px}
.prog-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:1.4rem;display:flex;align-items:center;gap:14px}
.prog-bar{flex:1;background:var(--color-border-tertiary);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:#4f46e5;transition:width 0.4s}
.prog-txt{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.2rem}
.cat-tab{padding:5px 13px;border-radius:99px;border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.15s}
.cat-tab.on{background:#4f46e5;color:#fff;border-color:transparent}
.cat-tab:hover:not(.on){background:var(--color-background-secondary)}
.panel{display:none}.panel.on{display:block}
.module{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:1rem;overflow:hidden}
.mod-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--color-background-secondary);user-select:none}
.mod-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1}
.mod-badge{font-size:11px;padding:2px 9px;border-radius:99px}
.badge-must{background:#fee2e2;color:#991b1b}
.badge-core{background:#dbeafe;color:#1d4ed8}
.badge-deep{background:#ede9fe;color:#5b21b6}
@media(prefers-color-scheme:dark){
.badge-must{background:#450a0a;color:#fca5a5}
.badge-core{background:#1e3a8a;color:#93c5fd}
.badge-deep{background:#2e1065;color:#c4b5fd}
}
.mod-chev{font-size:13px;color:var(--color-text-secondary);transition:transform 0.2s}
.mod-chev.open{transform:rotate(180deg)}
.mod-done{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.mod-body{padding:0;border-top:0.5px solid var(--color-border-tertiary);display:none}
.mod-body.open{display:block}
.note{font-size:12px;color:var(--color-text-secondary);padding:10px 14px 12px;line-height:1.6;border-bottom:0.5px solid var(--color-border-tertiary)}
.kw-list{list-style:none}
.kw-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background 0.1s}
.kw-item:last-child{border-bottom:none}
.kw-item:hover{background:var(--color-background-secondary)}
.kw-num{font-size:11px;font-weight:500;color:var(--color-text-tertiary);width:24px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.kw-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.kw-check.done{background:#16a34a;border-color:#16a34a}
.kw-check.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.kw-text{font-size:13px;color:var(--color-text-primary);flex:1;line-height:1.4}
.kw-text.done{color:var(--color-text-secondary);text-decoration:line-through;text-decoration-color:var(--color-border-secondary)}
</style>

const learned={};
let globalSeq={};
let gNum=1;

function buildSeq(){
  gNum=1;
  CATS.forEach(cat=>{
    cat.modules.forEach((m,mi)=>{
      m.keywords.forEach((kw,ki)=>{
        const kid=cat.id+'_'+mi+'_'+ki;
        globalSeq[kid]=gNum++;
      });
    });
  });
}

function countAll(){
  let c=0;CATS.forEach(cat=>cat.modules.forEach(m=>c+=m.keywords.length));return c;
}
function countDone(){return Object.values(learned).filter(Boolean).length;}
function updateProg(){
  const t=countAll(),d=countDone(),p=t?Math.round(d/t*100):0;
  document.getElementById('pf').style.width=p+'%';
  document.getElementById('pt').textContent=d+' / '+t+' studied';
}
function updateModDone(mid,cat,mi){
  const m=cat.modules[mi];
  let done=0;
  m.keywords.forEach((_,ki)=>{const kid=cat.id+'_'+mi+'_'+ki;if(learned[kid])done++;});
  document.getElementById('md-'+mid).textContent=done+'/'+m.keywords.length;
}

function toggleKw(cat,mi,ki){
  const kid=cat.id+'_'+mi+'_'+ki;
  learned[kid]=!learned[kid];
  const mid=cat.id+'_'+mi;
  const chk=document.getElementById('chk-'+kid);
  const txt=document.getElementById('txt-'+kid);
  if(chk){chk.classList.toggle('done',learned[kid]);}
  if(txt){txt.classList.toggle('done',learned[kid]);}
  updateModDone(mid,cat,mi);
  updateProg();
}

function toggleMod(mid){
  const body=document.getElementById('mb-'+mid);
  const chev=document.getElementById('mc-'+mid);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}

function switchCat(id){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('on',t.dataset.id===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id==='pan-'+id));
}

function render(){
  buildSeq();
  const tabs=document.getElementById('ctabs');
  tabs.innerHTML=CATS.map((c,i)=>`<button class="cat-tab${i===0?' on':''}" data-id="${c.id}" onclick="switchCat('${c.id}')">${c.label}</button>`).join('');
  const panels=document.getElementById('panels');
  panels.innerHTML=CATS.map((cat,ci)=>`
<div class="panel${ci===0?' on':''}" id="pan-${cat.id}">
  ${cat.modules.map((m,mi)=>{
    const mid=cat.id+'_'+mi;
    const startNum=globalSeq[cat.id+'_'+mi+'_0'];
    const endNum=globalSeq[cat.id+'_'+mi+'_'+(m.keywords.length-1)];
    return`<div class="module">
      <div class="mod-head" onclick="toggleMod('${mid}')">
        <span class="mod-title">${m.title}</span>
        <span style="font-size:11px;color:var(--color-text-tertiary);margin-right:4px">#${startNum}–${endNum}</span>
        <span class="mod-badge badge-${m.badge}">${m.badge==='must'?'Must know':m.badge==='core'?'Core':'Deep dive'}</span>
        <span class="mod-done" id="md-${mid}" style="margin-left:4px">0/${m.keywords.length}</span>
        <i class="ti ti-chevron-down mod-chev" id="mc-${mid}" aria-hidden="true" style="margin-left:6px"></i>
      </div>
      <div class="mod-body" id="mb-${mid}">
        <p class="note">${m.note}</p>
        <ul class="kw-list">
          ${m.keywords.map((kw,ki)=>{
            const kid=cat.id+'_'+mi+'_'+ki;
            const num=globalSeq[kid];
            return`<li class="kw-item" onclick="toggleKw(CATS[${ci}],${mi},${ki})">
              <span class="kw-num">${num}</span>
              <span class="kw-check" id="chk-${kid}"></span>
              <span class="kw-text" id="txt-${kid}">${kw}</span>
            </li>`;
          }).join('')}
        </ul>
      </div>
    </div>`;
  }).join('')}
</div>`).join('');
}

render();updateProg();
</script>
